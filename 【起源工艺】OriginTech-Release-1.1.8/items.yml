OriginTech_info:
  lateInit: false
  item_group: OriginTech_info
  item:
    name: '&c&l起源工艺 - 介绍'
    lore:
      - '&7这是一个没有什么特色的附属'
      - '&7写这个附属的初衷是创造一些有用的机器，能简化一些材料的生产线'
      - '&7但现在嘛......你可以在其中看到一大堆成分复杂的东西'
      - '&7作者并不怎么会设计一个好的流程，因此你可能会看到一些无厘头的配方，以及一些似乎只是凑数用的材料'
      - '&7总之，希望这个附属能为你的发展提供一些帮助'
      - '&7祝你游戏愉快'
    material_type: mc
    material: PAPER
    amount: 1
  placeable: false
  recipe_type: 'NULL'
OriginTech_info2:
  lateInit: false
