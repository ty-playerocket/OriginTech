      - '&7感谢其他为本附属提供帮助的附属开发者们'
      - '&7感谢提供反馈的广大玩家'
      - '&4本附属后期难度极高！强烈建议在毕业逻辑工艺后再推进后期!'
      - "&e- 版本号: Release-1.1.8"
